services:
  - type: web
    name: storyrag-backend
    runtime: docker
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: StoryRAG_Issuer
      - key: Jwt__Audience
        value: StoryRAG_Audience
      - key: Security__MasterKey
        sync: false
      - key: Gemini__ChatApiKey
        sync: false
      - key: Gemini__AnalyzeApiKey
        sync: false
      - key: Gemini__EmbeddingModel
        value: gemini-embedding-001
      - key: Gemini__ChatModels
        value: gemma-4-31b,gemma-4-26b
      - key: Gemini__EmbeddingDimensions
        value: "768"
      - key: Email__SmtpHost
        value: smtp.gmail.com
      - key: Email__SmtpPort
        value: "587"
      - key: Email__Username
        sync: false
      - key: Email__Password
        sync: false
      - key: Email__FromName
        value: StoryNest
      - key: Email__FromAddress
        sync: false
      - key: Cors__AllowedOrigins
        sync: false
      - key: VNPay__PaymentUrl
        value: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - key: VNPay__TmnCode
        sync: false
      - key: VNPay__HashSecret
        sync: false
      - key: VNPay__ReturnUrl
        sync: false
